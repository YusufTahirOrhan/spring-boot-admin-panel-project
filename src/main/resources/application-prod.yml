spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DB_URL:}}}
    username: ${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${DB_USERNAME:}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${DB_PASSWORD:}}}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

clickhouse:
  url: ${CLICKHOUSE_URL:}
  username: ${CLICKHOUSE_USERNAME:}
  password: ${CLICKHOUSE_PASSWORD:}

security:
  bootstrap:
    owner:
      enabled: ${BOOTSTRAP_OWNER_ENABLED:false}
      username: ${BOOTSTRAP_OWNER_USERNAME:}
      email: ${BOOTSTRAP_OWNER_EMAIL:}
      password: ${BOOTSTRAP_OWNER_PASSWORD:}
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-minutes: ${JWT_ACCESS_MINUTES:60}
    refresh-token-minutes: ${JWT_REFRESH_MINUTES:10080}
    issuer: optimaxx-prod
  login-protection:
    max-failures: ${LOGIN_MAX_FAILURES:5}
    lock-minutes: ${LOGIN_LOCK_MINUTES:15}
  forgot-password-protection:
    max-requests: ${FORGOT_PASSWORD_MAX_REQUESTS:3}
    window-minutes: ${FORGOT_PASSWORD_WINDOW_MINUTES:15}

management:
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  site-assets:
    storage: ${SITE_ASSET_STORAGE:cloudinary}

logging:
  level:
    root: INFO
    com.optimaxx.management: INFO
