spring:
  application:
    name: optimaxx-management-system
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

security:
  bootstrap:
    owner:
      enabled: ${BOOTSTRAP_OWNER_ENABLED:true}
      username: ${BOOTSTRAP_OWNER_USERNAME:owner}
      email: ${BOOTSTRAP_OWNER_EMAIL:owner@optimaxx.local}
      password: ${BOOTSTRAP_OWNER_PASSWORD:owner12345}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  site-assets:
    storage: ${SITE_ASSET_STORAGE:local}
    local-directory: ${SITE_ASSET_LOCAL_DIRECTORY:uploads/site}
    cloudinary-url: ${CLOUDINARY_URL:}
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:optimaxx/site}
